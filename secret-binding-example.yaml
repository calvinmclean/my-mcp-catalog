name: Ping Echo (Secret Binding)
shortDescription: Multi-user template with Kubernetes secret bindings
description: |
  Same ping/echo server but configured with secretBinding on env vars
  so that sensitive values are sourced from pre-existing Kubernetes Secrets
  rather than entered at deploy time.

  Requires the Kubernetes MCP runtime backend and a git-managed catalog source.

  Expected Secrets in the Obot namespace:
    - "ping-echo-secrets" with key "secret-key"

  kubectl -n <obot-namespace> create secret generic ping-echo-secrets \
    --from-literal=secret-key='hello-from-the-vault'

runtime: containerized
serverUserType: multiUser
containerizedConfig:
  image: ghcr.io/calvinmclean/mcp-ping-echo:main
  port: 8080
  path: /mcp
multiUserConfig:
  userDefinedHeaders:
    - name: X-User-Token
      key: X-User-Token
      description: Per-user authentication token
      sensitive: true
      required: false
env:
  - name: GREETING
    key: GREETING
    description: Prefix added to every echo response
    required: false
  - name: SECRET_KEY
    key: SECRET_KEY
    description: Bound from Kubernetes Secret "ping-echo-secrets"
    sensitive: true
    required: true
    secretBinding:
      name: ping-echo-secrets
      key: secret-key
  - name: SECRET_KEY_NEW
    key: SECRET_KEY_NEW
    description: Bound from Kubernetes Secret "ping-echo-secrets"
    sensitive: true
    required: true
    secretBinding:
      name: ping-echo-secrets
      key: secret-key
  - name: SECRET_KEY_NEW_2
    key: SECRET_KEY_NEW_2
    description: Bound from Kubernetes Secret "ping-echo-secrets"
    sensitive: true
    required: true
    secretBinding:
      name: ping-echo-secrets
      key: secret-key
