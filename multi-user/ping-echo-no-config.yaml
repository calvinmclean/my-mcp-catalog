name: Ping Echo Server No Config
entryKey: multi-user-ping-echo-no-config
shortDescription: Containerized multi-user MCP server with ping/pong and echo tools
description: |
  A demo multi-user MCP server template. Provides two tools:
  - ping: returns "pong" with the container hostname (useful for verifying shared-instance behavior)
  - echo: echoes a message, optionally prefixed by the GREETING env var

  Demonstrates a containerized multi-user server template without required user configuration.
runtime: containerized
serverUserType: multiUser
containerizedConfig:
  image: ghcr.io/calvinmclean/mcp-ping-echo:main
  port: 8080
  path: /mcp
  startupTimeoutSeconds: 30
